<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="theme-color" content="#1976d2">
  <title>森町建設課GIS (Field)</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header id="app-header">
    <div id="search-bar">
      <select id="search-type">
        <option value="address">住所</option>
        <option value="road">町道</option>
        <option value="bridge">橋梁</option>
      </select>
      <input type="text" id="search-input" placeholder="検索...">
      <button id="search-btn" aria-label="検索">🔎</button>
    </div>
    <button id="share-btn" aria-label="共有" title="エクスポート">⬆</button>
  </header>

  <main id="map-container">
    <div id="map"></div>
    <div id="fab-stack">
      <button id="fab-basemap" aria-label="背景切替">🗺</button>
      <button id="fab-gps" aria-label="現在地">📍</button>
      <button id="fab-add" aria-label="登録">＋</button>
    </div>
  </main>

  <footer id="app-footer">
    <span>森町建設課GIS (Field) <span id="version-label">v0.1.0</span></span>
    <span id="memo-count">0件</span>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
