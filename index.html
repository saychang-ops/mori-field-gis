<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="theme-color" content="#1976d2">
  <title>森町建設課GIS (Field)</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header id="app-header">
    <div id="search-bar">
      <select id="search-type">
        <option value="address">住所</option>
        <option value="road">町道</option>
        <option value="bridge">橋梁</option>
      </select>
      <input type="text" id="search-input" placeholder="検索...">
      <button id="search-btn" aria-label="検索">🔎</button>
    </div>
    <button id="share-btn" aria-label="共有" title="エクスポート">⬆</button>
    <button id="clear-all-btn" aria-label="全削除" title="現場メモ全削除">🗑</button>
  </header>

  <div id="line-mode-bar" class="hidden">
    <span id="line-mode-label">線描画中（2点以上で確定可）</span>
    <button id="line-undo">← 戻る</button>
    <button id="line-confirm">✓ 確定</button>
    <button id="line-cancel">キャンセル</button>
  </div>

  <div id="point-mode-bar" class="hidden">
    <span id="point-mode-label">登録地点をタップして選択してください</span>
    <button id="point-confirm" disabled>✓ 確定</button>
    <button id="point-cancel">キャンセル</button>
  </div>

  <div id="search-results" class="hidden"></div>

  <main id="map-container">
    <div id="map"></div>
    <div id="fab-stack">
      <button id="fab-basemap" aria-label="背景切替">🗺</button>
      <button id="fab-gps" aria-label="現在地">📍</button>
      <button id="fab-add" aria-label="登録">＋</button>
    </div>
  </main>

  <div id="bottom-sheet-overlay" class="hidden">
    <div id="bottom-sheet">
      <button id="bottom-sheet-close" aria-label="閉じる">×</button>
      <h3 id="bottom-sheet-title">現場メモ</h3>
      <form id="memo-form">
        <label>タイトル
          <input type="text" id="f-name" required maxlength="100">
        </label>
        <label>内容
          <textarea id="f-remarks" rows="3" maxlength="500"></textarea>
        </label>
        <label>記録日
          <input type="date" id="f-date">
        </label>
        <label>登録者
          <input type="text" id="f-person" maxlength="50">
        </label>
        <div id="style-section">
          <div id="style-point-panel">
            <div class="style-label">アイコン形状</div>
            <div class="style-options" id="pick-shape"></div>
            <div class="style-label">色</div>
            <div class="style-options" id="pick-icon-color"></div>
          </div>
          <div id="style-line-panel" class="hidden">
            <div class="style-label">線種</div>
            <div class="style-options" id="pick-line-style"></div>
            <div class="style-label">太さ</div>
            <div class="style-options" id="pick-line-width"></div>
            <div class="style-label">色</div>
            <div class="style-options" id="pick-line-color"></div>
          </div>
        </div>
        <div id="photo-section">
          <div class="photo-buttons">
            <label class="btn-like">
              📷 撮影
              <input type="file" id="f-photo-camera" accept="image/*" capture="environment" hidden>
            </label>
            <label class="btn-like">
              🖼 選択
              <input type="file" id="f-photo-gallery" accept="image/*" multiple hidden>
            </label>
            <span id="photo-hint" class="photo-hint">最大10枚添付可能</span>
          </div>
          <div id="photo-thumbnails"></div>
        </div>
        <div class="form-actions">
          <button type="button" id="form-cancel">キャンセル</button>
          <button type="submit" id="form-save">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>

  <div id="lightbox" class="hidden" aria-hidden="true">
    <button id="lightbox-prev" class="lightbox-nav" aria-label="前へ">◀</button>
    <img id="lightbox-img" alt="拡大写真" />
    <button id="lightbox-next" class="lightbox-nav" aria-label="次へ">▶</button>
    <button id="lightbox-close" aria-label="閉じる">×</button>
    <span id="lightbox-counter"></span>
  </div>

  <footer id="app-footer">
    <span>森町建設課GIS (Field) <span id="version-label">v1.3.4-diag</span></span>
    <span id="memo-count">0件</span>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
